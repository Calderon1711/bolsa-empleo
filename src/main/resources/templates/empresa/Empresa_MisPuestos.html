<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Empresa - Mis puestos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body class="d-flex flex-column min-vh-100">

<div th:replace="~{fragmentos/nav :: navbar}"></div>

    <main class="container py-4 flex-grow-1">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="mb-0">Mis Puestos</h4>
            <a th:href="@{/empresa/puestos/publicar}" class="btn btn-primary btn-sm">Publicar puesto</a>
        </div>

        <div th:if="${#lists.isEmpty(puestos)}" class="text-secondary">
            No tenés puestos publicados aún.
        </div>

        <table class="table table-striped" th:unless="${#lists.isEmpty(puestos)}">
            <thead>
                <tr>
                    <th scope="col">ID</th>
                    <th scope="col">Título</th>
                    <th scope="col">Salario (USD)</th>
                    <th scope="col">Salario (CRC)</th>
                    <th scope="col">Tipo</th>
                    <th scope="col">Activo</th>
                    <th scope="col">Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="puesto : ${puestos}">
                    <th scope="row" th:text="${puesto.id}"></th>
                    <td th:text="${puesto.titulo}"></td>
                    <td th:text="'$ ' + ${#numbers.formatDecimal(puesto.salario, 1, 'COMMA', 2, 'POINT')}"></td>
                    <td th:text="'₡ ' + ${#numbers.formatDecimal(puesto.salario * tipoCambio, 1, 'COMMA', 2, 'POINT')}"></td>
                    <td th:text="${puesto.tipoPublicacion}"></td>
                    <td>
                        <span th:if="${puesto.estado}" class="badge bg-success">Sí</span>
                        <span th:unless="${puesto.estado}" class="badge bg-secondary">No</span>
                    </td>
                    <td>
                        <form th:if="${puesto.estado}"
                              th:action="@{/empresa/puestos/desactivar/{id}(id=${puesto.id})}"
                              method="post" class="d-inline">
                            <button type="submit" class="btn btn-outline-danger btn-sm">
                                Desactivar
                            </button>
                        </form>
                        <form th:if="${!puesto.estado}"
                              th:action="@{/empresa/puestos/activar/{id}(id=${puesto.id})}"
                              method="post" class="d-inline">
                            <button type="submit" class="btn btn-outline-success btn-sm">
                                Activar
                            </button>
                        </form>
                        <a th:href="@{/empresa/candidatos/buscar(puestoId=${puesto.id})}"
                           class="btn btn-outline-primary btn-sm ms-1">
                            Buscar candidatos
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
    </main>

    <footer class="footer footer-dark mt-5 bg-dark">
        <div class="container py-3">
            <div class="row align-items-center gy-2">
                <div class="col-12 col-md-6">
                    <div class="text-white fw-semibold">Bolsa de Empleo</div>
                    <small class="text-white-50">Total Soft Inc.</small>
                </div>
                <div class="col-12 col-md-6 text-md-end">
                    <div>
                        <small class="text-white-50">Contactar: </small>
                        <a class="text-white-50 text-decoration-none" href="mailto:info@ejemplo.com">info@ejemplo.com</a>
                    </div>
                    <small class="text-white-50">Crédito: Equipo de desarrollo</small>
                </div>
            </div>
        </div>
    </footer>
</body>
</html>
