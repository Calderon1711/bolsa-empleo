<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Empresa - Detalle candidato</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body class="d-flex flex-column min-vh-100">

<div th:replace="~{fragmentos/nav :: navbar}"></div>


    <main class="container py-4 flex-grow-1">
        <h4 class="mb-3">Detalle de oferente</h4>

        <div th:if="${oferente == null}" class="alert alert-warning">
            No se encontró el oferente solicitado.
        </div>

        <div th:unless="${oferente == null}">
            <div class="card mb-4">
                <div class="card-body">
                    <h5 class="card-title"
                        th:text="${oferente.nombreOferente + ' ' + oferente.primerApellido}"></h5>
                    <p class="mb-1">
                        <span class="fw-bold">Identificación: </span>
                        <span th:text="${oferente.cedulaOferente}"></span>
                    </p>
                    <p class="mb-1">
                        <span class="fw-bold">Email: </span>
                        <span th:text="${oferente.correoOferente}"></span>
                    </p>
                    <p class="mb-1">
                        <span class="fw-bold">Teléfono: </span>
                        <span th:text="${oferente.telefonoOferente}"></span>
                    </p>
                    <p class="mb-0">
                        <span class="fw-bold">Residencia: </span>
                        <span th:text="${oferente.lugarResidencia}"></span>
                    </p>
                </div>
            </div>

            <h5 class="mb-3">Habilidades</h5>

            <div th:if="${#lists.isEmpty(habilidades)}" class="text-secondary">
                Este oferente no tiene habilidades registradas.
            </div>

            <table class="table" th:unless="${#lists.isEmpty(habilidades)}">
                <thead>
                    <tr>
                        <th scope="col">Característica</th>
                        <th scope="col">Nivel</th>
                    </tr>
                </thead>
                <tbody class="table-group-divider">
                    <tr th:each="h : ${habilidades}">
                        <td th:text="${h.caracteristica.nombre}"></td>
                        <td th:text="${h.nivel}"></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <a href="javascript:history.back()" class="btn btn-outline-secondary btn-sm mt-2">Volver</a>
    </main>

<div th:replace="~{fragmentos/Footer :: footer}"></div>
</body>
</html>
