<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registro Empresa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body class="d-flex flex-column min-vh-100">

    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container-fluid">
                <a class="navbar-brand" th:href="@{/}">
                    <img th:src="@{/img/bolsaEmpleo.png}" alt="BolsaEmpleo" width="70" height="70" class="d-inline-block align-text-top">
                </a>
                <a class="navbar-brand fw-semibold" th:href="@{/}">BOLSA DE EMPLEO</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                    <div class="navbar-nav">
                        <a class="nav-link" th:href="@{/buscar-puestos}">Buscar Puestos</a>
                        <a class="nav-link active" th:href="@{/registro-empresa}">Registro Empresa</a>
                        <a class="nav-link" th:href="@{/registro-oferente}">Registro Oferente</a>
                    </div>
                    <div class="navbar-nav ms-auto">
                        <a class="nav-link" th:href="@{/login}">Login</a>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main class="container py-4 flex-grow-1">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6">

                <h4 class="mb-3">Registro de Empresa</h4>

                <!-- Alerta de éxito tras el registro -->
                <div th:if="${exitoso}" class="alert alert-success" role="alert">
                    Registro exitoso. Un administrador revisará tu solicitud pronto.
                </div>

                <div class="card">
                    <div class="card-body">
                        <form th:action="@{/registro-empresa}" th:object="${empresa}" method="post">

                            <div class="mb-3">
                                <label for="nombreEmpresa" class="form-label">Nombre de la empresa</label>
                                <input type="text" class="form-control" id="nombreEmpresa"
                                       th:field="*{nombreEmpresa}" required>
                            </div>

                            <div class="mb-3">
                                <label for="correoEmpresa" class="form-label">Correo electrónico</label>
                                <input type="email" class="form-control" id="correoEmpresa"
                                       th:field="*{correoEmpresa}" required>
                            </div>

                            <div class="mb-3">
                                <label for="passwordEmpresa" class="form-label">Contraseña</label>
                                <input type="password" class="form-control" id="passwordEmpresa"
                                       th:field="*{passwordEmpresa}" required>
                            </div>

                            <div class="mb-3">
                                <label for="telefono" class="form-label">Teléfono</label>
                                <input type="text" class="form-control" id="telefono"
                                       th:field="*{telefono}">
                            </div>

                            <div class="mb-3">
                                <label for="localizacion" class="form-label">Localización</label>
                                <input type="text" class="form-control" id="localizacion"
                                       th:field="*{localizacion}">
                            </div>

                            <div class="mb-3">
                                <label for="descripcionEmpresa" class="form-label">Descripción</label>
                                <textarea class="form-control" id="descripcionEmpresa" rows="3"
                                          th:field="*{descripcionEmpresa}"></textarea>
                            </div>

                            <div class="text-center">
                                <button type="submit" class="btn btn-primary">Registrarse</button>
                            </div>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <footer class="footer footer-dark mt-5 bg-dark">
        <div class="container py-3">
            <div class="row align-items-center gy-2">
                <div class="col-12 col-md-6">
                    <div class="text-white fw-semibold">Bolsa de Empleo</div>
                    <small class="text-white-50">Total Soft Inc.</small>
                </div>
                <div class="col-12 col-md-6 text-md-end">
                    <div>
                        <small class="text-white-50">Contactar: </small>
                        <a class="text-white-50 text-decoration-none" href="mailto:info@ejemplo.com">info@ejemplo.com</a>
                    </div>
                    <small class="text-white-50">Crédito: Equipo de desarrollo</small>
                </div>
            </div>
        </div>
    </footer>
</body>
</html>
