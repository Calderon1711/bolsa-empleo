<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Empresa - Candidatos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body class="d-flex flex-column min-vh-100">

<div th:replace="~{fragmentos/nav :: navbar}"></div>


    <main class="container py-4 flex-grow-1">
        <h4 class="mb-1">Candidatos para el puesto</h4>
        <p class="text-secondary small mb-4">
            <span class="fw-semibold">Puesto: </span>
            <span th:text="${puesto.titulo}"></span>
        </p>

        <div th:if="${#lists.isEmpty(candidatos)}" class="text-secondary">
            No se encontraron candidatos con habilidades que coincidan con este puesto.
        </div>

        <table class="table table-striped" th:unless="${#lists.isEmpty(candidatos)}">
            <thead>
                <tr>
                    <th scope="col">Oferente</th>
                    <th scope="col">Requisitos cumplidos</th>
                    <th scope="col">% Coincidencia</th>
                    <th scope="col"></th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="resultado : ${candidatos}">
                    <td th:text="${resultado.oferente.nombreOferente + ' ' + resultado.oferente.primerApellido}"></td>
                    <td th:text="${resultado.requisitosCumplidos + '/' + resultado.totalRequisitos}"></td>
                    <td th:text="${#numbers.formatDecimal(resultado.porcentajeCoincidencia, 1, 'COMMA', 2, 'POINT') + '%'}"></td>
                    <td>
                        <a th:href="@{/empresa/candidatos/{cedula}(cedula=${resultado.oferente.cedulaOferente})}"
                           class="btn btn-outline-primary btn-sm">
                            Ver detalle
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>

        <a th:href="@{/empresa/puestos}" class="btn btn-outline-secondary btn-sm mt-2">Volver</a>
    </main>

    <footer class="footer footer-dark mt-5 bg-dark">
        <div class="container py-3">
            <div class="row align-items-center gy-2">
                <div class="col-12 col-md-6">
                    <div class="text-white fw-semibold">Bolsa de Empleo</div>
                    <small class="text-white-50">Total Soft Inc.</small>
                </div>
                <div class="col-12 col-md-6 text-md-end">
                    <div>
                        <small class="text-white-50">Contactar: </small>
                        <a class="text-white-50 text-decoration-none" href="mailto:info@ejemplo.com">info@ejemplo.com</a>
                    </div>
                    <small class="text-white-50">Crédito: Equipo de desarrollo</small>
                </div>
            </div>
        </div>
    </footer>
</body>
</html>
