<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Oferente - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">

<div th:replace="~{fragmentos/nav :: navbar}"></div>


<main class="container py-4 flex-grow-1">
    <div class="mb-4">
        <h4>Oferente - Dashboard</h4>
        <p class="text-secondary mb-1" th:if="${oferente != null}">
            Bienvenido:
            <strong th:text="${oferente.nombreOferente + ' ' + oferente.primerApellido}"></strong>
        </p>
        <p class="text-secondary" th:text="'Cédula: ' + ${cedula}"></p>
    </div>

    <div class="row g-3">
        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5>Mis habilidades</h5>
                    <p class="text-secondary">Administra tus habilidades y niveles.</p>
                    <a class="btn btn-primary btn-sm"
                       th:href="@{/oferente/habilidades}">Ir</a>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5>Postulaciones</h5>
                    <p class="text-secondary">Consulta puestos y postúlate.</p>
                    <a class="btn btn-primary btn-sm"
                       th:href="@{/oferente/postulaciones}">Ir</a>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5>Mi CV</h5>
                    <p class="text-secondary">Sube y consulta tu CV en PDF.</p>
                    <a class="btn btn-primary btn-sm"
                       th:href="@{/oferente/cv}">Ir</a>
                </div>
            </div>
        </div>
    </div>
</main>

<footer class="footer footer-dark mt-5 bg-dark">
    <div class="container py-3">
        <div class="row align-items-center gy-2">

            <div class="col-12 col-md-6">
                <div class="text-white fw-semibold">Bolsa de Empleo</div>
                <small class="text-white-50">Total Soft Inc.</small>
            </div>

            <div class="col-12 col-md-6 text-md-end">
                <div>
                    <small class="text-white-50">Contactar: </small>
                    <a class="text-white-50 text-decoration-none" href="mailto:info@ejemplo.com">
                        info@ejemplo.com
                    </a>
                </div>
                <small class="text-white-50">Cr&eacute;dito: Equipo de desarrollo</small>
            </div>

        </div>
    </div>
</footer>
</body>
</html>
