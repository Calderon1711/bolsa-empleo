<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Oferente - CV</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand fw-semibold" th:href="@{/}">BOLSA DE EMPLEO</a>
            <div class="navbar-nav">
                <a class="nav-link" th:href="@{/oferente/dashboard}">Dashboard</a>
                <a class="nav-link active" th:href="@{/oferente/habilidades}">Mis habilidades</a>
                <a class="nav-link" th:href="@{/oferente/postulaciones}">Postulaciones</a>
                <a class="nav-link" th:href="@{/oferente/cv}">Mi CV</a>
            </div>
        </div>
    </nav>
</header>

<div class="container py-4">
    <h4>Mi CV</h4>
    <div th:if="${exitoso}" class="alert alert-success" th:text="${exitoso}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="row g-4">
        <div class="col-12 col-lg-6">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5>Subir CV en PDF</h5>
                    <form method="post" enctype="multipart/form-data" th:action="@{/oferente/cv}">
                        <div class="mb-3">
                            <label class="form-label">Descripción</label>
                            <textarea class="form-control" name="descripcion" rows="3"></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Archivo PDF</label>
                            <input type="file" class="form-control" name="archivo" accept="application/pdf" required>
                        </div>
                        <button class="btn btn-primary" type="submit">Guardar CV</button>
                    </form>
                </div>
            </div>
        </div>
        <div class="col-12 col-lg-6">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5>CV actual</h5>
                    <div th:if="${cv != null}">
                        <p><strong>Descripción:</strong> <span th:text="${cv.descripcionCurriculum}"></span></p>
                        <p><strong>Fecha:</strong> <span th:text="${cv.fechaCreacionCurriculum}"></span></p>
                        <a class="btn btn-outline-primary" th:href="@{/oferente/cv/ver/{id}(id=${cv.idCurriculum})}" target="_blank">Ver CV</a>
                    </div>
                    <p th:if="${cv == null}" class="text-secondary">Todavía no se ha cargado un CV.</p>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
