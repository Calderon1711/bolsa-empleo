<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registro de Oferente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" th:href="@{/}">
                <img th:src="@{/img/bolsaEmpleo.png}" alt="BolsaEmpleo" width="70" height="70" class="d-inline-block align-text-top">
            </a>
            <a class="navbar-brand fw-semibold" th:href="@{/}">BOLSA DE EMPLEO</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                <div class="navbar-nav">
                    <a class="nav-link" th:href="@{/buscar-puestos}">Buscar Puestos</a>
                    <a class="nav-link" th:href="@{/registro-empresa}">Registro Empresa</a>
                    <a class="nav-link" th:href="@{/registro-oferente}">Registro Oferente</a>
                </div>
                <div class="navbar-nav ms-auto">
                    <a class="nav-link" th:href="@{/login}">Login</a>
                </div>
            </div>
        </div>
    </nav>
</header>
<div class="container py-4">
    <h3>Registro de oferente</h3>

    <div th:if="${exitoso}" class="alert alert-success">
        Registro enviado correctamente. Queda pendiente de aprobación.
    </div>

    <form method="post" th:action="@{/registro-oferente}" th:object="${oferente}">
        <div class="mb-3">
            <label class="form-label">Cédula</label>
            <input type="text" class="form-control" th:field="*{cedulaOferente}" required />
        </div>

        <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input type="text" class="form-control" th:field="*{nombreOferente}" required />
        </div>

        <div class="mb-3">
            <label class="form-label">Primer apellido</label>
            <input type="text" class="form-control" th:field="*{primerApellido}" required />
        </div>

        <div class="mb-3">
            <label class="form-label">Correo</label>
            <input type="email" class="form-control" th:field="*{correoOferente}" required />
        </div>

        <div class="mb-3">
            <label class="form-label">Contraseña</label>
            <input type="password" class="form-control" th:field="*{passwordOferente}" required />
        </div>

        <div class="mb-3">
            <label class="form-label">Teléfono</label>
            <input type="text" class="form-control" th:field="*{telefonoOferente}" />
        </div>

        <div class="mb-3">
            <label class="form-label">Lugar de residencia</label>
            <input type="text" class="form-control" th:field="*{lugarResidencia}" />
        </div>

        <div class="mb-3">
            <label class="form-label">Nacionalidad</label>
            <select class="form-select" name="idNacionalidad" required>
                <option value="">Seleccione</option>
                <option th:each="n : ${nacionalidades}"
                        th:value="${n.idNacionalidad}"
                        th:text="${n.nombreNacionalidad}">
                </option>
            </select>
        </div>

        <button class="btn btn-primary" type="submit">Registrar oferente</button>
        <a class="btn btn-outline-secondary" th:href="@{/login}">Volver</a>
    </form>
</div>
<footer class="footer footer-dark mt-5 bg-dark">
    <div class="container py-3">
        <div class="row align-items-center gy-2">

            <div class="col-12 col-md-6">
                <div class="text-white fw-semibold">Bolsa de Empleo</div>
                <small class="text-white-50">Total Soft Inc.</small>
            </div>

            <div class="col-12 col-md-6 text-md-end">
                <div>
                    <small class="text-white-50">Contactar: </small>
                    <a class="text-white-50 text-decoration-none" href="mailto:info@ejemplo.com">
                        info@ejemplo.com
                    </a>
                </div>
                <small class="text-white-50">Cr&eacute;dito: Equipo de desarrollo</small>
            </div>

        </div>
    </div>
</footer>
</body>
</html>
