<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Oferente - Habilidades</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">

<div th:replace="~{fragmentos/HeaderOferente :: headerOferente}"></div>

<main class="container py-4 flex-grow-1">
    <h4 class="mb-3">Mis habilidades</h4>

    <div th:if="${exitoso}" class="alert alert-success" th:text="${exitoso}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="row g-4">
        <div class="col-lg-5">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5>Habilidades registradas</h5>
                    <table class="table table-sm">
                        <thead>
                        <tr>
                            <th>Característica</th>
                            <th>Nivel</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="habilidad : ${habilidades}">
                            <td th:text="${habilidad.caracteristica.nombre}"></td>
                            <td th:text="${habilidad.nivel}"></td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(habilidades)}">
                            <td colspan="2" class="text-secondary">No has agregado habilidades todavía.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5>Ruta</h5>

                    <nav class="mb-3">
                        <a class="btn btn-outline-secondary btn-sm me-1"
                           th:href="@{/oferente/habilidades}">
                            Raíces
                        </a>

                        <span th:each="item : ${ruta}">
                            <span class="mx-1">/</span>
                            <a class="btn btn-outline-primary btn-sm"
                               th:href="@{/oferente/habilidades(cedula=${cedula}, padreId=${item.id})}"
                               th:text="${item.nombre}"></a>
                        </span>
                    </nav>

                    <p class="text-secondary">
                        Viendo:
                        <strong th:text="${actual != null ? actual.nombre : 'Raíces'}"></strong>
                    </p>

                    <div class="list-group">
                        <a class="list-group-item list-group-item-action d-flex justify-content-between align-items-center"
                           th:each="sub : ${subcategorias}"
                           th:href="@{/oferente/habilidades(cedula=${cedula}, padreId=${sub.id})}">
                            <span th:text="${sub.nombre}"></span>
                            <span class="badge text-bg-primary">Entrar</span>
                        </a>

                        <div class="list-group-item text-secondary" th:if="${#lists.isEmpty(subcategorias)}">
                            No hay subcategorías disponibles.
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-3">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5>Agregar habilidad</h5>

                    <form method="post" th:action="@{/oferente/habilidades/agregar}">

                        <div class="mb-3">
                            <label class="form-label">Característica</label>
                            <select class="form-select" name="caracteristicaId" required>
                                <option value="">Seleccione una característica</option>

                                <option th:each="item : ${subcategorias}"
                                        th:value="${item.id}"
                                        th:text="${item.nombre}">
                                </option>

                                <option th:if="${#lists.isEmpty(subcategorias)}"
                                        th:each="item : ${caracteristicasRaiz}"
                                        th:value="${item.id}"
                                        th:text="${item.nombre}">
                                </option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Nivel</label>
                            <input type="number" class="form-control" name="nivel" min="1" max="5" required>
                        </div>

                        <button class="btn btn-primary w-100" type="submit">Agregar</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<footer class="footer footer-dark mt-5 bg-dark">
    <div class="container py-3">
        <div class="row align-items-center gy-2">

            <div class="col-12 col-md-6">
                <div class="text-white fw-semibold">Bolsa de Empleo</div>
                <small class="text-white-50">Total Soft Inc.</small>
            </div>

            <div class="col-12 col-md-6 text-md-end">
                <div>
                    <small class="text-white-50">Contactar: </small>
                    <a class="text-white-50 text-decoration-none" href="mailto:info@ejemplo.com">
                        info@ejemplo.com
                    </a>
                </div>
                <small class="text-white-50">Cr&eacute;dito: Equipo de desarrollo</small>
            </div>

        </div>
    </div>
</footer>
</body>
</html>
