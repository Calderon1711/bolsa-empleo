<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Oferente - Postulaciones</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-4">
    <h4>Postulación a puestos</h4>
    <div th:if="${exitoso}" class="alert alert-success" th:text="${exitoso}"></div>
    <div class="row g-4">
        <div class="col-12 col-lg-6">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5>Puestos disponibles</h5>
                    <table class="table table-sm">
                        <thead><tr><th>Puesto</th><th>Empresa</th><th></th></tr></thead>
                        <tbody>
                        <tr th:each="puesto : ${puestos}">
                            <td th:text="${puesto.titulo}"></td>
                            <td th:text="${puesto.empresa.nombreEmpresa}"></td>
                            <td>
                                <form method="post" th:action="@{/oferente/postular}">
                                    <input type="hidden" name="cedula" th:value="${cedula}">
                                    <input type="hidden" name="puestoId" th:value="${puesto.id}">
                                    <button class="btn btn-primary btn-sm" type="submit">Postular</button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        <div class="col-12 col-lg-6">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5>Mis postulaciones</h5>
                    <table class="table table-sm">
                        <thead><tr><th>Puesto</th><th>Fecha</th><th>Estado</th></tr></thead>
                        <tbody>
                        <tr th:each="postulacion : ${postulaciones}">
                            <td th:text="${postulacion.puesto.titulo}"></td>
                            <td th:text="${postulacion.fechaPostulacion}"></td>
                            <td th:text="${postulacion.estado}"></td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(postulaciones)}"><td colspan="3">No hay postulaciones registradas.</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
