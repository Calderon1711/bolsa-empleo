<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin - Empresas pendientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragmentos/nav :: navbar}"></div>


<div class="container py-4">
    <h4>Empresas pendientes</h4>

    <div th:if="${exitoso}" class="alert alert-success" th:text="${exitoso}"></div>

    <table class="table table-bordered table-sm">
        <thead>
        <tr>
            <th>ID</th>
            <th>Empresa</th>
            <th>Correo</th>
            <th>Fecha registro</th>
            <th></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="empresa : ${empresas}">
            <td th:text="${empresa.idEmpresa}"></td>
            <td th:text="${empresa.nombreEmpresa}"></td>
            <td th:text="${empresa.correoEmpresa}"></td>
            <td th:text="${empresa.fechaRegistroEmpresa}"></td>
            <td>
                <form method="post"
                      th:action="@{/admin/empresas/{id}/aprobar(id=${empresa.idEmpresa})}">
                    <button class="btn btn-success btn-sm" type="submit">Aprobar</button>
                </form>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(empresas)}">
            <td colspan="5" class="text-secondary">No hay empresas pendientes.</td>
        </tr>
        </tbody>
    </table>

    <a class="btn btn-outline-secondary btn-sm" th:href="@{/admin/dashboard}">Volver</a>
</div>

</body>
</html>
