<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin - Características</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" th:href="@{/}">
                <img th:src="@{/img/bolsaEmpleo.png}" alt="BolsaEmpleo" width="70" height="70" class="d-inline-block align-text-top">
            </a>
            <a class="navbar-brand fw-semibold" th:href="@{/}">BOLSA DE EMPLEO</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                <div class="navbar-nav">
                    <a class="nav-link active" th:href="@{/admin/dashboard}">Dashboard</a>
                    <a class="nav-link" th:href="@{/admin/empresas-pendientes}">Empresas pendientes</a>
                    <a class="nav-link" th:href="@{/admin/oferentes-pendientes}">Oferentes pendientes</a>
                    <a class="nav-link" th:href="@{/admin/caracteristicas}">Características</a>
                    <a class="nav-link" th:href="@{/admin/reporte/pdf}">Reportes</a>
                </div>
                <div class="navbar-nav ms-auto">
                    <a class="btn btn-outline-light btn-sm" th:href="@{/login}">Salir</a>
                </div>
            </div>
        </div>
    </nav>
</header>
<div class="container py-4">
    <h4>Catálogo de características</h4>

    <div th:if="${exitoso}" class="alert alert-success" th:text="${exitoso}"></div>

    <div class="row g-4">
        <div class="col-lg-7">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5>Ruta</h5>

                    <nav class="mb-3">
                        <a class="btn btn-outline-secondary btn-sm me-1"
                           th:href="@{/admin/caracteristicas}">
                            Raíces
                        </a>

                        <span th:each="item : ${ruta}">
                            <span class="mx-1">/</span>
                            <a class="btn btn-outline-primary btn-sm"
                               th:href="@{/admin/caracteristicas(padreId=${item.id})}"
                               th:text="${item.nombre}">
                            </a>
                        </span>
                    </nav>

                    <p class="text-secondary">
                        Viendo:
                        <strong th:text="${actual != null ? actual.nombre : 'Raíces'}"></strong>
                    </p>

                    <div class="list-group">
                        <a class="list-group-item list-group-item-action d-flex justify-content-between align-items-center"
                           th:each="sub : ${subcategorias}"
                           th:href="@{/admin/caracteristicas(padreId=${sub.id})}">
                            <span th:text="${sub.nombre}"></span>
                            <span class="badge text-bg-primary">Entrar</span>
                        </a>

                        <div class="list-group-item text-secondary" th:if="${#lists.isEmpty(subcategorias)}">
                            No hay subcategorías registradas.
                        </div>
                    </div>

                    <div class="mt-4">
                        <h6>Características raíz</h6>
                        <ul class="list-group">
                            <li class="list-group-item" th:each="raiz : ${raices}" th:text="${raiz.nombre}"></li>
                            <li class="list-group-item text-secondary" th:if="${#lists.isEmpty(raices)}">No hay raíces.</li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-5">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5>Agregar característica</h5>

                    <form method="post" th:action="@{/admin/caracteristicas}">
                        <input type="hidden" name="padreId" th:value="${padreId}"/>

                        <div class="mb-3">
                            <label class="form-label">Nombre</label>
                            <input type="text" class="form-control" name="nombre" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Padre actual</label>
                            <input type="text" class="form-control"
                                   th:value="${actual != null ? actual.nombre : 'Sin padre (raíz)'}"
                                   readonly>
                        </div>

                        <button class="btn btn-primary" type="submit">Crear</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="mt-3">
        <a class="btn btn-outline-secondary btn-sm" th:href="@{/admin/dashboard}">Volver</a>
    </div>
</div>
</body>
</html>
